<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TORQONE.IN — Admin Panel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --red: #E8192C;
    --red-dark: #b5111f;
    --red-glow: rgba(232,25,44,0.18);
    --black: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --surface3: #222222;
    --border: #2a2a2a;
    --border-bright: #333;
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
    --green: #22c55e;
    --orange: #f97316;
    --font-display: 'Rajdhani', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --bottom-nav-h: 64px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--black);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--red-dark); border-radius: 3px; }

  /* ── LAYOUT ─────────────────────────────── */
  .app { display: flex; min-height: 100vh; }

  /* Desktop sidebar */
  .sidebar {
    width: 220px; min-height: 100vh; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; z-index: 100;
  }
  .main { margin-left: 220px; flex: 1; min-height: 100vh; }

  /* Mobile bottom nav (hidden on desktop) */
  .bottom-nav {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--surface);
    border-top: 1px solid var(--border);
    height: var(--bottom-nav-h);
    align-items: stretch;
  }
  .bottom-nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    cursor: pointer; font-size: 10px; color: var(--text-muted);
    transition: color 0.15s; padding: 6px 2px;
    border: none; background: none;
    -webkit-tap-highlight-color: transparent;
  }
  .bottom-nav-item .bn-icon { font-size: 20px; line-height: 1; }
  .bottom-nav-item.active { color: var(--red); }
  .bottom-nav-fab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    cursor: pointer; font-size: 10px; color: var(--text-muted);
    -webkit-tap-highlight-color: transparent;
  }
  .bottom-nav-fab .fab-circle {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--red); display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin-bottom: 2px;
    box-shadow: 0 2px 12px rgba(232,25,44,0.5);
    margin-top: -18px;
  }

  /* ── SIDEBAR ────────────────────────────── */
  .logo-area { padding: 22px 18px 18px; border-bottom: 1px solid var(--border); }
  .logo-text { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: 1px; color: #fff; }
  .logo-text span { color: var(--red); }
  .logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
  .nav { padding: 14px 10px; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    cursor: pointer; margin-bottom: 4px;
    font-size: 13.5px; font-weight: 500; color: var(--text-muted);
    transition: all 0.18s; border: 1px solid transparent; user-select: none;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--red-glow); border-color: rgba(232,25,44,0.35); color: #fff; }
  .nav-item.active .nav-icon { color: var(--red); }
  .nav-icon { font-size: 16px; width: 18px; text-align: center; }
  .sidebar-footer { padding: 14px 18px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-dim); }

  /* ── TOPBAR ─────────────────────────────── */
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .page-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  .topbar-right { display: flex; gap: 8px; align-items: center; }

  /* ── CONTENT ────────────────────────────── */
  .content { padding: 20px; }

  /* ── STAT CARDS ─────────────────────────── */
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    position: relative; overflow: hidden; transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--border-bright); }
  .stat-card.accent { border-color: rgba(232,25,44,0.4); }
  .stat-card.accent::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--red); }
  .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-display); font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.orange { color: var(--orange); }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  /* ── TABLE CARD ─────────────────────────── */
  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .table-title { font-family: var(--font-display); font-size: 16px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 14px; font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* Mobile sales card (replaces table rows on mobile) */
  .sale-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
  }
  .sale-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .sale-card-invoice { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--red); }
  .sale-card-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .sale-card-amount { font-family: var(--font-display); font-size: 18px; font-weight: 700; }
  .sale-card-profit { font-size: 12px; text-align: right; margin-top: 2px; }
  .sale-card-mid { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  .sale-card-customer { font-weight: 600; font-size: 14px; }
  .sale-card-vehicle { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .sale-card-actions { display: flex; gap: 8px; }
  .sale-card-actions .btn { flex: 1; justify-content: center; font-size: 13px; }

  /* ── BADGES ─────────────────────────────── */
  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-ig { background: rgba(225,48,108,0.15); color: #e1306c; }
  .badge-fb { background: rgba(66,103,178,0.15); color: #4267b2; }
  .badge-wa { background: rgba(37,211,102,0.15); color: #25d366; }
  .badge-ref { background: rgba(255,255,255,0.08); color: #aaa; }

  /* ── BUTTONS ────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px; border-radius: 8px;
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-red { background: var(--red); color: #fff; }
  .btn-red:active { background: var(--red-dark); }
  .btn-green { background: #25d366; color: #fff; }
  .btn-green:active { background: #1da851; }
  .btn-outline { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-outline:active { border-color: var(--border-bright); color: var(--text); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:active { background: var(--surface3); }
  .btn-sm { padding: 6px 11px; font-size: 12px; }
  .btn-icon { padding: 8px; }

  /* ── INPUTS ─────────────────────────────── */
  .input-group { margin-bottom: 16px; }
  .input-label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; }
  input, select, textarea {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: var(--font-body); font-size: 14px;
    padding: 11px 13px; outline: none; transition: border-color 0.18s;
    -webkit-appearance: none; appearance: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--red); }
  input::placeholder { color: var(--text-dim); }
  select option { background: var(--surface2); }

  /* ── MODAL ──────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.8);
    display: flex; align-items: flex-end; justify-content: center;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border-bright);
    border-radius: 18px 18px 0 0;
    width: 100%; max-width: 100%;
    max-height: 92vh; overflow-y: auto;
  }
  .modal-head {
    padding: 16px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--surface); z-index: 2;
  }
  .modal-handle { width: 36px; height: 4px; background: var(--border-bright); border-radius: 2px; margin: 10px auto 0; }
  .modal-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; }
  .modal-body { padding: 18px; }
  .modal-foot { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  .close-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
  .close-btn:active { background: var(--surface2); }

  /* ── FORM GRID ──────────────────────────── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-full { grid-column: 1 / -1; }

  /* ── ITEMS TABLE IN FORM ────────────────── */
  .items-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  .items-table th { background: var(--surface3); padding: 7px 8px; font-size: 10.5px; }
  .items-table td { padding: 5px 3px; }
  .items-table input, .items-table select { padding: 8px 8px; font-size: 13px; }
  .add-item-row { margin-top: 10px; }

  /* ── SEARCH ─────────────────────────────── */
  .search-bar { position: relative; }
  .search-bar input { padding-left: 36px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px; }

  /* ── BILL PREVIEW ───────────────────────── */
  .bill-preview { background: #fff; color: #111; border-radius: 8px; padding: 0; font-family: Arial, sans-serif; font-size: 13px; }
  .bill-header-bar { background: #0a0a0a; color: #fff; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .bill-logo-text { font-size: 24px; font-weight: 900; letter-spacing: 1px; font-family: 'Rajdhani', sans-serif; }
  .bill-logo-text span { color: var(--red); }
  .bill-tag { font-size: 9px; letter-spacing: 2px; color: #aaa; margin-top: 2px; }
  .bill-info { font-size: 10px; color: #ccc; text-align: right; }
  .bill-body { padding: 16px 18px; }
  .bill-meta { display: flex; gap: 20px; margin-bottom: 14px; flex-wrap: wrap; }
  .bill-meta-block { flex: 1; min-width: 130px; }
  .bill-meta-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .bill-meta-val { font-size: 12px; font-weight: 600; color: #111; }
  .bill-meta-val.small { font-size: 11px; font-weight: 400; }
  .bill-table { width: 100%; border-collapse: collapse; margin: 10px 0; border: 1px solid #ddd; }
  .bill-table th { background: #0a0a0a; color: #fff; padding: 8px 8px; text-align: left; font-size: 10px; border-right: 1px solid #333; white-space: nowrap; }
  .bill-table th:last-child { border-right: none; }
  .bill-table td { padding: 8px 8px; border-bottom: 1px solid #eee; border-right: 1px solid #eee; font-size: 12px; vertical-align: middle; word-break: break-word; }
  .bill-table td:last-child { border-right: none; }
  .bill-table tr:last-child td { border-bottom: none; }
  .bill-table .col-no { width: 28px; text-align: center; }
  .bill-table .col-desc { }
  .bill-table .col-qty { width: 60px; text-align: center; white-space: nowrap; }
  .bill-table .col-rate { width: 80px; text-align: right; white-space: nowrap; }
  .bill-table .col-amt { width: 90px; text-align: right; white-space: nowrap; font-weight: 600; }
  .bill-totals { margin-top: 10px; }
  .bill-total-row { display: flex; justify-content: flex-end; }
  .bill-total-table { width: 220px; border: 1px solid #ddd; border-collapse: collapse; }
  .bill-total-table td { padding: 6px 9px; font-size: 12px; border-bottom: 1px solid #eee; }
  .bill-total-table td:last-child { text-align: right; font-weight: 600; }
  .bill-grand { font-weight: 700; font-size: 13px; background: #0a0a0a; color: #fff; }
  .bill-grand td { padding: 8px 9px; border-bottom: none; }
  .bill-grand td:last-child { text-align: right; }
  .bill-footer { background: var(--red); color: #fff; padding: 9px 18px; font-size: 10px; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
  .bill-decl { padding: 9px 18px; font-size: 10px; color: #555; border-top: 1px solid #eee; }
  .bill-sig { text-align: right; padding: 12px 18px; font-size: 11px; color: #555; }

  /* ── WHATSAPP BAR ───────────────────────── */
  .wa-bar { padding: 12px 18px; background: #0d1f17; border-bottom: 1px solid #1a3326; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .wa-bar-label { font-size: 12px; color: #4ade80; font-weight: 600; white-space: nowrap; }
  .wa-btn-customer { background: #25d366; color: #fff; font-weight: 700; border: none; flex: 1; min-width: 160px; justify-content: center; font-size: 14px; padding: 10px 14px; border-radius: 10px; }
  .wa-btn-dealer { background: #128c7e; color: #fff; font-weight: 600; border: none; flex: 1; min-width: 160px; justify-content: center; font-size: 13px; padding: 10px 14px; border-radius: 10px; }

  /* ── EMPTY STATE ────────────────────────── */
  .empty-state { text-align: center; padding: 50px 20px; color: var(--text-dim); }
  .empty-icon { font-size: 38px; margin-bottom: 10px; }
  .empty-text { font-size: 14px; }

  /* ── SETUP ──────────────────────────────── */
  .setup-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px 24px; width: 100%; max-width: 460px; text-align: center; }
  .setup-logo { font-family: var(--font-display); font-size: 34px; font-weight: 700; margin-bottom: 6px; }
  .setup-logo span { color: var(--red); }

  /* ── P&L ────────────────────────────────── */
  .pl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .pl-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; overflow-x: auto; }

  /* ── TABS ───────────────────────────────── */
  .tabs { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: 10px; width: fit-content; margin-bottom: 18px; }
  .tab { padding: 7px 14px; border-radius: 7px; font-size: 13px; cursor: pointer; color: var(--text-muted); transition: all 0.18s; }
  .tab.active { background: var(--surface3); color: var(--text); }

  /* ── CUSTOMER HISTORY ───────────────────── */
  .customer-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  .customer-card-head { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .customer-card-head:active { background: var(--surface2); }
  .customer-name { font-weight: 600; font-size: 15px; }
  .customer-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .customer-body { border-top: 1px solid var(--border); padding: 12px 16px; display: none; overflow-x: auto; }
  .customer-body.open { display: block; }

  /* ── LOADING / TOAST ────────────────────── */
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 80px; right: 16px; z-index: 9999; background: var(--surface2); border: 1px solid var(--border-bright); border-radius: 10px; padding: 12px 16px; font-size: 13px; display: flex; align-items: center; gap: 10px; animation: toastIn 0.3s ease; max-width: 300px; }
  .toast.success { border-color: rgba(34,197,94,0.5); }
  .toast.error { border-color: rgba(232,25,44,0.5); }
  @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* ── MISC ───────────────────────────────── */
  .text-muted { color: var(--text-muted); }
  .text-red { color: var(--red); }
  .text-green { color: var(--green); }
  .text-orange { color: var(--orange); }
  .fw-600 { font-weight: 600; }
  .fs-12 { font-size: 12px; }
  .mt-4 { margin-top: 4px; }

  /* ══════════════════════════════════════════
     MOBILE BREAKPOINT  ≤ 768px
  ══════════════════════════════════════════ */
  @media (max-width: 768px) {
    /* hide desktop sidebar, show bottom nav */
    .sidebar { display: none !important; }
    .bottom-nav { display: flex !important; }
    .main { margin-left: 0; padding-bottom: var(--bottom-nav-h); }

    /* topbar compact */
    .topbar { padding: 10px 14px; }
    .page-title { font-size: 17px; }
    .topbar-right .btn { padding: 7px 10px; font-size: 12px; }

    /* content padding */
    .content { padding: 14px; }

    /* stats 2-col on mobile */
    .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { padding: 12px; }
    .stat-value { font-size: 20px; }
    .stat-label { font-size: 9px; }

    /* hide desktop table, show sale cards */
    .desktop-table { display: none; }
    .mobile-cards { display: block; }

    /* form grid single col */
    .form-grid { grid-template-columns: 1fr; }
    .form-full { grid-column: 1; }

    /* modal full screen bottom sheet */
    .modal-overlay { align-items: flex-end; padding: 0; }
    .modal { border-radius: 18px 18px 0 0; max-height: 95vh; border-left: none; border-right: none; border-bottom: none; }
    .modal-body { padding: 14px; }
    .modal-foot { padding: 12px 14px; position: sticky; bottom: 0; background: var(--surface); }

    /* items table scroll on mobile */
    .items-table-wrap { overflow-x: auto; }
    .items-table { min-width: 560px; }

    /* P&L single col */
    .pl-grid { grid-template-columns: 1fr; }

    /* bill preview fit mobile */
    .bill-preview { font-size: 11px; }
    .bill-header-bar { padding: 12px 14px; }
    .bill-logo-text { font-size: 20px; }
    .bill-body { padding: 12px 14px; }

    /* wa bar stack vertically */
    .wa-bar { flex-direction: column; align-items: stretch; gap: 8px; }
    .wa-btn-customer, .wa-btn-dealer { min-width: unset; }

    /* toast above bottom nav */
    .toast { bottom: calc(var(--bottom-nav-h) + 10px); right: 12px; left: 12px; max-width: unset; }

    /* customer body table scroll */
    .customer-body { padding: 10px 12px; }

    /* tabs scrollable */
    .tabs { width: 100%; overflow-x: auto; }
    .tab { white-space: nowrap; }
  }

  /* hide mobile-cards on desktop */
  .mobile-cards { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const { jsPDF } = window.jspdf;
const { createClient } = supabase;

// ─── SUPABASE CONFIG ────────────────────────────────────────────────
// 🔧 REPLACE these with your actual Supabase project credentials

// ─── TOAST ───────────────────────────────────────────────────────────
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3200); return () => clearTimeout(t); }, []);
  return (
    <div className={`toast ${type}`}>
      <span>{type === 'success' ? '✅' : '❌'}</span>
      <span>{msg}</span>
    </div>
  );
}

// ─── SETUP SCREEN ────────────────────────────────────────────────────
function SetupScreen({ onConnect }) {
  const [url, setUrl] = useState('');
  const [key, setKey] = useState('');
  const [showSql, setShowSql] = useState(false);

  const connect = () => {
    if (!url || !key) return;
    localStorage.setItem('torqone_sb_url', url);
    localStorage.setItem('torqone_sb_key', key);
    onConnect(url, key);
  };

  return (
    <div className="setup-screen">
      <div className="setup-card">
        <div className="setup-logo"><span>TORQ</span>ONE.IN</div>
        <div style={{fontSize:11,color:'var(--text-muted)',letterSpacing:2,textTransform:'uppercase',marginBottom:28}}>Automotive Performance Hub</div>
        <div style={{width:48,height:3,background:'var(--red)',margin:'0 auto 28px',borderRadius:2}}></div>
        <div style={{textAlign:'left'}}>
          <div className="input-group">
            <label className="input-label">Supabase Project URL</label>
            <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxx.supabase.co" />
          </div>
          <div className="input-group">
            <label className="input-label">Supabase Anon Key</label>
            <input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJ..." type="password" />
          </div>
          <button className="btn btn-red" style={{width:'100%',justifyContent:'center',marginBottom:14}} onClick={connect}>
            🔗 Connect & Launch
          </button>
          <button className="btn btn-outline" style={{width:'100%',justifyContent:'center',fontSize:12}} onClick={()=>setShowSql(!showSql)}>
            {showSql ? '▲ Hide' : '▼ Show'} Database Setup SQL
          </button>
          {showSql && (
            <div style={{marginTop:12,background:'var(--black)',borderRadius:8,padding:14,fontFamily:'monospace',fontSize:11,color:'#7dd3fc',whiteSpace:'pre-wrap',border:'1px solid var(--border)',overflowX:'auto'}}>

          Admin-only panel · TORQONE.IN © 2026

  );
}

function generatePDF(sale) {
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210; let y = 0;

  // Header bar
  doc.setFillColor(10,10,10);
  doc.rect(0, 0, W, 36, 'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(22); doc.setTextColor(232,25,44); doc.text('TORQ', 14, 20);
  const tw = doc.getTextWidth('TORQ');
  doc.setTextColor(255,255,255); doc.text('ONE.IN', 14+tw, 20);
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.setTextColor(170,170,170); doc.text('AUTOMOTIVE PERFORMANCE HUB', 14, 28);

  // Invoice info right side
  doc.setFontSize(9); doc.setTextColor(200,200,200);
  doc.text('Edappally, Kochi, Kerala | Mobile: 9037523225', W-14, 16, {align:'right'});
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
  doc.text(`Invoice No: ${sale.invoice_no}`, W-14, 22, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setTextColor(200,200,200);
  doc.text(`Invoice Date: ${sale.invoice_date}`, W-14, 28, {align:'right'});

  y = 44;
  // Bill To
  doc.setTextColor(0,0,0); doc.setFontSize(8); doc.setFont('helvetica','bold');
  doc.setTextColor(120,120,120); doc.text('BILL TO', 14, y);
  y += 5;
  doc.setTextColor(0,0,0); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text(sale.customer_name, 14, y); y += 5;
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  if(sale.customer_address) { doc.text(sale.customer_address, 14, y); y += 5; }
  doc.text(`Mobile: ${sale.customer_mobile || '—'}`, 14, y);

  // Vehicle
  let vy = 49;
  doc.setFontSize(8); doc.setTextColor(120,120,120); doc.setFont('helvetica','bold');
  doc.text('VEHICLE', W/2, vy); vy+=5;
  doc.setFontSize(11); doc.setTextColor(0,0,0);
  doc.text(`${sale.vehicle_model || '—'} ${sale.vehicle_year || ''}`, W/2, vy); vy+=5;
  doc.setFontSize(8); doc.setTextColor(120,120,120); doc.text('PAYMENT', W/2, vy+2); vy+=7;
  doc.setFontSize(9); doc.setTextColor(0,0,0); doc.setFont('helvetica','normal');
  doc.text(sale.payment_mode, W/2, vy);

  y = 82;
  // Table header
  doc.setFillColor(10,10,10);
  doc.rect(14, y-5, W-28, 8, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(255,255,255);
  doc.text('#', 17, y); doc.text('Part Description', 25, y);
  doc.text('Qty', 110, y); doc.text('Rate (₹)', 130, y); doc.text('Amount (₹)', W-14, y, {align:'right'});

  y += 4;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(0,0,0);
  (sale.items || []).forEach((item, i) => {
    y += 7;
    if (i % 2 === 0) { doc.setFillColor(248,248,248); doc.rect(14, y-5, W-28, 7, 'F'); }
    doc.text(String(i+1), 17, y);
    doc.text(item.description, 25, y);
    doc.text(`${item.qty} ${item.unit}`, 110, y);
    doc.text(Number(item.rate).toLocaleString('en-IN'), 130, y);
    doc.text(Number(item.amount).toLocaleString('en-IN'), W-14, y, {align:'right'});
  });

  y += 12;
  // Totals
  const tx = W - 75;
  doc.setDrawColor(220,220,220); doc.line(tx, y-2, W-14, y-2);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text('Subtotal', tx, y); doc.text(`₹${Number(sale.subtotal).toLocaleString('en-IN')}`, W-14, y, {align:'right'});
  y+=6; doc.text('GST', tx, y); doc.text('NIL', W-14, y, {align:'right'});
  y+=2; doc.line(tx, y, W-14, y); y+=5;
  doc.setFillColor(10,10,10); doc.rect(tx-2, y-5, W-14-tx+16, 9, 'F');
  doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text('Grand Total', tx, y); doc.text(`₹${Number(sale.grand_total).toLocaleString('en-IN')}`, W-14, y, {align:'right'});

  y += 14;
  // Declaration
  doc.setTextColor(0,0,0); doc.setFont('helvetica','normal'); doc.setFontSize(8);
  doc.text('Declaration: Goods sold without GST. This invoice is issued by a Non-GST automotive spare parts seller.', 14, y);
  y += 8; doc.text(`Payment Mode: ${sale.payment_mode}`, 14, y);

  y += 14;
  doc.text('Authorized Signature', W-14, y, {align:'right'});
  y += 5; doc.setFont('helvetica','bold');
  doc.text('For TORQONE.IN Automotive Spare Parts Store', W-14, y, {align:'right'});

  // Footer
  doc.setFillColor(232,25,44);
  doc.rect(0, 287, W, 10, 'F');
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(255,255,255);
  doc.text('torqone.in · 9037523225 · Edappally, Kochi', 14, 293);
  doc.text('Thank you for your purchase!', W-14, 293, {align:'right'});

  doc.save(`TORQONE_${sale.invoice_no.replace('/','_')}.pdf`);
}

// ─── WHATSAPP SHARE ──────────────────────────────────────────────────
function shareOnWhatsApp(sale, type = 'customer') {
  const items = (sale.items || []);
  const itemLines = items.map((it, i) =>
    `  ${i+1}. ${it.description} — ${it.qty} ${it.unit} x Rs.${Number(it.rate).toLocaleString('en-IN')} = Rs.${Number(it.amount).toLocaleString('en-IN')}`
  ).join('\n');

  let msg = '';
  if (type === 'customer') {
    msg = [
      '*TORQONE.IN — Invoice*',
      '————————————————————',
      `Invoice No: *${sale.invoice_no}*`,
      `Date: ${sale.invoice_date}`,
      '',
      `Customer: *${sale.customer_name}*`,
      sale.customer_address ? `Address: ${sale.customer_address}` : '',
      sale.vehicle_model ? `Vehicle: ${sale.vehicle_model} ${sale.vehicle_year || ''}` : '',
      '',
      '*Parts / Items:*',
      itemLines,
      '————————————————————',
      `*Grand Total: Rs.${Number(sale.grand_total).toLocaleString('en-IN')}*`,
      `Payment: ${sale.payment_mode}`,
      '',
      '_GST NIL — Non-GST Seller_',
      '',
      'Thank you for choosing TORQONE.IN!',
      'Ph: 9037523225 | Edappally, Kochi',
    ].filter(l => l !== null && l !== undefined).join('\n');
  } else {
    msg = [
      '*TORQONE.IN — Parts Requirement*',
      '————————————————————',
      `Date: ${sale.invoice_date}`,
      sale.vehicle_model ? `Vehicle: ${sale.vehicle_model} ${sale.vehicle_year || ''}` : '',
      '',
      '*Parts Needed:*',
      items.map((it, i) => `  ${i+1}. ${it.description} — ${it.qty} ${it.unit}`).join('\n'),
      '',
      'Kindly confirm availability and price.',
      '— TORQONE.IN | 9037523225',
    ].filter(l => l !== null && l !== undefined).join('\n');
  }

  const rawPhone = type === 'customer' ? (sale.customer_mobile || '') : '';
  const phone = rawPhone.replace(/\D/g,'').replace(/^0/,'91').replace(/^(?!91)/,'91');
  const encoded = encodeURIComponent(msg);
  const url = phone.length > 5 ? `https://wa.me/${phone}?text=${encoded}` : `https://wa.me/?text=${encoded}`;
  window.open(url, '_blank');
}

// ─── NEW SALE MODAL ──────────────────────────────────────────────────
const defaultItem = () => ({ description: '', qty: 1, unit: 'Nos', rate: '', buying_rate: '', amount: 0, buying_amount: 0 });

function NewSaleModal({ onClose, onSave, editSale }) {
  const [form, setForm] = useState(editSale || {
    invoice_no: '', invoice_date: today(),
    customer_name: '', customer_mobile: '', customer_address: '',
    vehicle_model: '', vehicle_year: '',
    lead_source: 'instagram',
    dealer_name: '',
    payment_mode: 'Cash',
    notes: '',
    items: [defaultItem()],
  });
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    if (!editSale) {
      setForm(f => ({ ...f, invoice_no: genInvoiceNo(Date.now()) }));
    }
  }, []);

  const setField = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const setItem = (i, k, v) => {
    const items = [...form.items];
    items[i] = { ...items[i], [k]: v };
    // recalc amounts
    const rate = parseFloat(k === 'rate' ? v : items[i].rate) || 0;
    const buying_rate = parseFloat(k === 'buying_rate' ? v : items[i].buying_rate) || 0;
    const qty = parseFloat(k === 'qty' ? v : items[i].qty) || 0;
    items[i].amount = rate * qty;
    items[i].buying_amount = buying_rate * qty;
    setForm(f => ({ ...f, items }));
  };

  const addItem = () => setForm(f => ({ ...f, items: [...f.items, defaultItem()] }));
  const removeItem = (i) => setForm(f => ({ ...f, items: f.items.filter((_,j) => j!==i) }));

  const subtotal = form.items.reduce((a,i) => a + (parseFloat(i.amount)||0), 0);
  const buying_total = form.items.reduce((a,i) => a + (parseFloat(i.buying_amount)||0), 0);
  const profit = subtotal - buying_total;

  const handleSave = async () => {
    if (!form.customer_name) return alert('Customer name required');
    if (!form.items.length || !form.items[0].description) return alert('Add at least one item');
    setSaving(true);
    await onSave({ ...form, subtotal, grand_total: subtotal, buying_total, profit });
    setSaving(false);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-head">
          <div className="modal-title">{editSale ? '✏️ Edit Sale' : '➕ New Sale'}</div>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {/* Invoice */}
          <div className="form-grid">
            <div className="input-group">
              <label className="input-label">Invoice No</label>
              <input value={form.invoice_no} onChange={e=>setField('invoice_no',e.target.value)} />
            </div>
            <div className="input-group">
              <label className="input-label">Invoice Date</label>
              <input type="date" value={form.invoice_date} onChange={e=>setField('invoice_date',e.target.value)} />
            </div>
          </div>
          {/* Customer */}
          <div style={{borderTop:'1px solid var(--border)',paddingTop:16,marginBottom:16}}>
            <div style={{fontSize:11,color:'var(--red)',letterSpacing:1.5,textTransform:'uppercase',fontWeight:600,marginBottom:12}}>Customer Info</div>
            <div className="form-grid">

// ─── P&L ─────────────────────────────────────────────────────────────
function ProfitLoss({ sales }) {
  const [period, setPeriod] = useState('all');
  const now = new Date();
  const thisMonth = now.toISOString().slice(0,7);
  const thisYear = String(now.getFullYear());

  const filtered = sales.filter(s => {
    if (period === 'all') return true;
    if (period === 'month') return s.invoice_date?.slice(0,7) === thisMonth;
    if (period === 'year') return s.invoice_date?.slice(0,4) === thisYear;
    return true;
  });

  const revenue = filtered.reduce((a,s) => a+(s.grand_total||0), 0);
  const cost = filtered.reduce((a,s) => a+(s.buying_total||0), 0);
  const profit = revenue - cost;
  const margin = revenue > 0 ? ((profit/revenue)*100).toFixed(1) : 0;

  // Monthly breakdown
  const monthly = {};
  sales.forEach(s => {
    const m = s.invoice_date?.slice(0,7);
    if (!m) return;
    if (!monthly[m]) monthly[m] = { revenue:0, cost:0, profit:0, count:0 };
    monthly[m].revenue += s.grand_total||0;
    monthly[m].cost += s.buying_total||0;
    monthly[m].profit += s.profit||0;
    monthly[m].count++;
  });
  const months = Object.entries(monthly).sort((a,b) => b[0].localeCompare(a[0])).slice(0,6);

  // By source
  const bySrc = {};
  filtered.forEach(s => {
    if (!bySrc[s.lead_source]) bySrc[s.lead_source] = { revenue:0, profit:0, count:0 };
    bySrc[s.lead_source].revenue += s.grand_total||0;
    bySrc[s.lead_source].profit += s.profit||0;
    bySrc[s.lead_source].count++;
  });

  return (
    <div>
      <div className="tabs">
        {[['all','All Time'],['month','This Month'],['year','This Year']].map(([v,l]) => (
          <div key={v} className={`tab ${period===v?'active':''}`} onClick={()=>setPeriod(v)}>{l}</div>
        ))}
      </div>
      <div className="stats-grid">
        <div className="stat-card accent">
          <div className="stat-label">Revenue</div>
          <div className="stat-value">{fmt(revenue)}</div>
          <div className="stat-sub">{filtered.length} sales</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Total Cost (Buying)</div>
          <div className="stat-value orange">{fmt(cost)}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Net Profit</div>
          <div className={`stat-value ${profit>=0?'green':'red'}`}>{fmt(profit)}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Profit Margin</div>
          <div className={`stat-value ${profit>=0?'green':'red'}`}>{margin}%</div>
        </div>
      </div>

      <div className="pl-grid">
        <div className="pl-card">
          <div className="table-title" style={{marginBottom:14}}>📅 Monthly Breakdown</div>
          <table>
            <thead><tr><th>Month</th><th>Sales</th><th>Revenue</th><th>Cost</th><th>Profit</th></tr></thead>
            <tbody>
              {months.length === 0 ? <tr><td colSpan="5" style={{textAlign:'center',color:'var(--text-dim)',padding:20}}>No data</td></tr> :
               months.map(([m, d]) => (
                <tr key={m}>
                  <td className="fw-600">{m}</td>
                  <td>{d.count}</td>
                  <td>{fmt(d.revenue)}</td>
                  <td className="text-orange">{fmt(d.cost)}</td>
                  <td className={d.profit>=0?'text-green fw-600':'text-red fw-600'}>{fmt(d.profit)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="pl-card">
          <div className="table-title" style={{marginBottom:14}}>📣 By Lead Source</div>
          <table>
            <thead><tr><th>Source</th><th>Sales</th><th>Revenue</th><th>Profit</th></tr></thead>
            <tbody>
              {Object.entries(bySrc).length === 0 ? <tr><td colSpan="4" style={{textAlign:'center',color:'var(--text-dim)',padding:20}}>No data</td></tr> :
               Object.entries(bySrc).sort((a,b)=>b[1].revenue-a[1].revenue).map(([src, d]) => (
                <tr key={src}>
                  <td><span className={`badge ${sourceBadge(src)}`}>{sourceLabel(src)}</span></td>
                  <td>{d.count}</td>
                  <td>{fmt(d.revenue)}</td>
                  <td className={d.profit>=0?'text-green fw-600':'text-red fw-600'}>{fmt(d.profit)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function CustomerHistory({ sales, onView }) {
  const [search, setSearch] = useState('');
  const [open, setOpen] = useState(null);

  const customers = {};
  sales.forEach(s => {
    const k = s.customer_mobile || s.customer_name;
    if (!customers[k]) customers[k] = { name: s.customer_name, mobile: s.customer_mobile, address: s.customer_address, sales: [] };
    customers[k].sales.push(s);
  });

  const list = Object.entries(customers).filter(([_, c]) => {
    const q = search.toLowerCase();
    return !q || c.name?.toLowerCase().includes(q) || c.mobile?.includes(q);
  }).sort((a,b) => b[1].sales.length - a[1].sales.length);

  return (
    <div>
      <div className="search-bar" style={{marginBottom:20}}>
        <span className="search-icon">🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search customers..." />

        <div className="customer-card" key={k}>

            <div>
              <div className="customer-name">{c.name}</div>

            <span style={{color:'var(--text-muted)',fontSize:18}}>{open===k?'▲':'▼'}</span>

          <div className={`customer-body ${open===k?'open':''}`}>
            <table>
              <thead><tr><th>Invoice</th><th>Date</th><th>Vehicle</th><th>Amount</th><th>Source</th><th></th></tr></thead>

                    <td className="fw-600">{fmt(s.grand_total)}</td>
                    <td><span className={`badge ${sourceBadge(s.lead_source)}`}>{sourceLabel(s.lead_source)}</span></td>
                    <td><button className="btn btn-ghost btn-sm" onClick={()=>onView(s)}>🧾 Bill</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ))}
    </div>
  );

// ─── MAIN APP ────────────────────────────────────────────────────────
function App() {
  const [sb, setSb] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [sales, setSales] = useState([]);
  const [loading, setLoading] = useState(false);
  const [modal, setModal] = useState(null); // null | 'new' | 'edit' | 'bill'
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState(null);

  // Check saved creds
  useEffect(() => {
    const url = localStorage.getItem('torqone_sb_url');
    const key = localStorage.getItem('torqone_sb_key');
    if (url && key) initSupabase(url, key);
  }, []);

  const showToast = (msg, type='success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  };

  const initSupabase = (url, key) => {
    try {
      const client = createClient(url, key);
      setSb(client);
      loadSales(client);
    } catch(e) {
      showToast('Failed to connect to Supabase', 'error');
    }
  };

  const loadSales = async (client) => {
    setLoading(true);
    try {
      const { data, error } = await client.from('sales').select('*').order('created_at', { ascending: false });
      if (error) throw error;
      setSales(data || []);
    } catch(e) {
      showToast('Error loading sales: ' + e.message, 'error');
    }
    setLoading(false);
  };

  const saveSale = async (form) => {
    if (!sb) return;
    try {
      if (selected?.id) {
        const { error } = await sb.from('sales').update(form).eq('id', selected.id);
        if (error) throw error;
        setSales(s => s.map(x => x.id === selected.id ? { ...x, ...form } : x));
        showToast('Sale updated ✅');
      } else {
        const { data, error } = await sb.from('sales').insert([form]).select();
        if (error) throw error;
        setSales(s => [data[0], ...s]);
        showToast('Sale saved ✅');
      }
      setModal(null); setSelected(null);
    } catch(e) {
      showToast('Error: ' + e.message, 'error');
    }
  };

  const deleteSale = async (s) => {
    if (!window.confirm(`Delete invoice ${s.invoice_no}?`)) return;
    try {
      const { error } = await sb.from('sales').delete().eq('id', s.id);
      if (error) throw error;
      setSales(prev => prev.filter(x => x.id !== s.id));
      showToast('Sale deleted');
    } catch(e) {
      showToast('Error: ' + e.message, 'error');
    }
  };

  if (!sb) return <SetupScreen onConnect={initSupabase} />;

  const nav = [
    { id: 'dashboard', icon: '📊', label: 'Dashboard' },
    { id: 'sales', icon: '📋', label: 'Sales' },
    { id: 'pl', icon: '📈', label: 'Profit & Loss' },
    { id: 'customers', icon: '👥', label: 'Customers' },
  ];

  const pageTitle = { dashboard:'Dashboard', sales:'Sales', pl:'Profit & Loss', customers:'Customers' };

  return (
    <div className="app">
      {/* Desktop Sidebar */}
      <div className="sidebar">
        <div className="logo-area">
          <div className="logo-text"><span>TORQ</span>ONE.IN</div>
          <div className="logo-sub">Admin Panel</div>
        </div>
        <nav className="nav">
          {nav.map(n => (
            <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div style={{marginBottom:4}}>🔗 Connected to Supabase</div>
          <div style={{cursor:'pointer',color:'var(--red)'}} onClick={()=>{localStorage.clear();window.location.reload()}}>⏏ Disconnect</div>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <div className="topbar">
          <div className="page-title">{pageTitle[page]}</div>
          <div className="topbar-right">
            {loading && <span className="spinner"></span>}
            <button className="btn btn-red btn-sm" onClick={()=>{setSelected(null);setModal('new')}}>➕ New Sale</button>
            <button className="btn btn-outline btn-sm" onClick={()=>loadSales(sb)}>↻</button>
          </div>
        </div>
        <div className="content">
          {page === 'dashboard' && <Dashboard sales={sales} />}
          {page === 'sales' && (
            <SalesList
              sales={sales}
              onNew={()=>{setSelected(null);setModal('new')}}
              onEdit={s=>{setSelected(s);setModal('edit')}}
              onView={s=>{setSelected(s);setModal('bill')}}
              onDelete={deleteSale}
            />
          )}
          {page === 'pl' && <ProfitLoss sales={sales} />}
          {page === 'customers' && <CustomerHistory sales={sales} onView={s=>{setSelected(s);setModal('bill')}} />}
        </div>
      </div>

      {/* Mobile Bottom Nav */}
      <div className="bottom-nav">
        {nav.map(n => (
          <button key={n.id} className={`bottom-nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
            <span className="bn-icon">{n.icon}</span>
            <span>{n.label}</span>
          </button>
        ))}
        <div className="bottom-nav-fab" onClick={()=>{setSelected(null);setModal('new')}}>
          <div className="fab-circle">➕</div>
          <span style={{fontSize:10,color:'var(--text-muted)'}}>New</span>
        </div>
      </div>

      {/* Modals */}
      {(modal==='new'||modal==='edit') && (
        <NewSaleModal
          editSale={modal==='edit' ? selected : null}
          onClose={()=>{setModal(null);setSelected(null)}}
          onSave={saveSale}
        />
      )}
      {modal==='bill' && selected && (
        <BillModal sale={selected} onClose={()=>{setModal(null);setSelected(null)}} />
      )}

      {/* Toast */}
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
