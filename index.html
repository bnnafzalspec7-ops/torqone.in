<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TORQONE.IN — Admin Panel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --red: #E8192C;
  --red-dark: #b5111f;
  --red-light: #ff2d42;
  --red-glow: rgba(232,25,44,0.15);
  --red-glow-strong: rgba(232,25,44,0.3);
  --black: #080808;
  --surface: #101010;
  --surface2: #161616;
  --surface3: #1e1e1e;
  --surface4: #242424;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --border-active: rgba(232,25,44,0.4);
  --text: #f2f2f2;
  --text-muted: #6b6b6b;
  --text-secondary: #a0a0a0;
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.1);
  --orange: #f97316;
  --orange-dim: rgba(249,115,22,0.1);
  --blue: #3b82f6;
  --font-display: 'Rajdhani', sans-serif;
  --font-body: 'Inter', sans-serif;
  --bottom-nav-h: 68px;
  --sidebar-w: 240px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
  --shadow-red: 0 4px 24px rgba(232,25,44,0.25);
  --transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { background: var(--black); background-image: linear-gradient(to bottom, rgba(8,8,8,0.85), rgba(8,8,8,0.97)), url('https://images.unsplash.com/photo-1599839619722-39751411ea63?q=80&w=1920&auto=format&fit=crop'); background-size: cover; background-position: center; background-attachment: fixed; color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(232,25,44,0.4); border-radius: 10px; }

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.8;
}

/* SVG ICONS */
.icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.icon svg { display: block; }

/* LAYOUT */
.app { display: flex; min-height: 100vh; position: relative; z-index: 1; }
.sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
.main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; }

/* Mobile bottom nav */
.bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 999; background: rgba(16,16,16,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); height: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom, 20px)); padding-bottom: env(safe-area-inset-bottom, 20px); align-items: stretch; justify-content: center; }
.bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; font-size: 10px; font-weight: 500; color: var(--text-muted); transition: var(--transition); padding: 6px 2px; border: none; background: transparent; height: 100%; -webkit-appearance: none; }
.bottom-nav-item.active { color: var(--red); }
.bottom-nav-fab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; font-size: 10px; color: var(--text-muted); font-weight: 500; height: 100%; position: relative; z-index: 10; -webkit-appearance: none; border: none; background: transparent; }
.bottom-nav-fab .fab-circle { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--red-light), var(--red-dark)); display: flex; align-items: center; justify-content: center; margin-bottom: 2px; box-shadow: 0 0 0 4px rgba(232,25,44,0.15), var(--shadow-red); margin-top: -24px; transition: var(--transition); }
.bottom-nav-fab:active .fab-circle { transform: scale(0.92); }

/* SIDEBAR */
.logo-area { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); position: relative; }
.logo-area::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--red-glow-strong), transparent); }
.logo-wordmark { font-family: var(--font-display); font-size: 24px; font-weight: 700; letter-spacing: 1px; line-height: 1; display: flex; align-items: center; }
.logo-wordmark .r { color: var(--red); }
.logo-wordmark .w { color: #fff; }
.logo-dot { width: 5px; height: 5px; background: var(--red); border-radius: 50%; margin: 0 2px; display: inline-block; vertical-align: middle; animation: pulse-dot 2.5s ease-in-out infinite; }
@keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.7); } }
.logo-sub { font-size: 9.5px; font-weight: 600; color: var(--text-muted); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 6px; }
.nav { padding: 16px 12px; flex: 1; }
.nav-section-label { font-size: 9px; font-weight: 700; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; padding: 0 8px; margin: 12px 0 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 2px; font-size: 13.5px; font-weight: 500; color: var(--text-secondary); transition: var(--transition); user-select: none; position: relative; letter-spacing: 0.1px; }
.nav-item:hover { background: var(--surface3); color: var(--text); }
.nav-item.active { background: var(--red-glow); color: #fff; }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 60%; background: var(--red); border-radius: 0 3px 3px 0; }
.nav-item .icon { opacity: 0.7; }
.nav-item.active .icon, .nav-item:hover .icon { opacity: 1; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
.sidebar-user { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.sidebar-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--red), var(--red-dark)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-name { font-size: 12.5px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-user-role { font-size: 10px; color: var(--text-muted); font-weight: 500; margin-top: 1px; }
.sidebar-conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse-green 2s ease-in-out infinite; }
@keyframes pulse-green { 0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 50% { box-shadow: 0 0 0 4px rgba(34,197,94,0); } }
.sidebar-disconnect { display: flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: var(--transition); padding: 7px 8px; border-radius: var(--radius-sm); margin-top: 2px; }
.sidebar-disconnect:hover { color: var(--red); background: rgba(232,25,44,0.06); }

/* TOPBAR */
.topbar { background: rgba(16,16,16,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 50; }
.topbar-left { display: flex; align-items: center; gap: 14px; }
.topbar-page-indicator { display: flex; align-items: center; gap: 10px; }
.topbar-page-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--red-glow); border: 1px solid var(--border-active); display: flex; align-items: center; justify-content: center; color: var(--red); }
.page-title { font-family: var(--font-display); font-size: 19px; font-weight: 700; letter-spacing: 0.3px; }
.topbar-right { display: flex; gap: 8px; align-items: center; }

/* CONTENT */
.content { padding: 24px; }

/* STAT CARDS */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; position: relative; overflow: hidden; transition: var(--transition); }
.stat-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.015) 0%, transparent 60%); pointer-events: none; }
.stat-card:hover { border-color: var(--border-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.stat-card.accent { border-color: rgba(232,25,44,0.3); background: linear-gradient(135deg, rgba(232,25,44,0.06), var(--surface)); }
.stat-card.accent::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--red), transparent); }
.stat-card-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
.stat-card-icon.red-icon { background: var(--red-glow); border: 1px solid rgba(232,25,44,0.2); color: var(--red); }
.stat-card-icon.green-icon { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.2); color: var(--green); }
.stat-card-icon.orange-icon { background: var(--orange-dim); border: 1px solid rgba(249,115,22,0.2); color: var(--orange); }
.stat-card-icon.blue-icon { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); color: var(--blue); }
.stat-label { font-size: 10.5px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px; }
.stat-value { font-family: var(--font-display); font-size: 28px; font-weight: 700; line-height: 1; letter-spacing: -0.5px; }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.orange { color: var(--orange); }
.stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-weight: 400; }

/* TABLE CARD */
.table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.table-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; letter-spacing: 0.3px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 11px 16px; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; background: var(--surface2); border-bottom: 1px solid var(--border); }
td { padding: 13px 16px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

/* Mobile sale cards */
.sale-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 10px; transition: var(--transition); }
.sale-card:active { background: var(--surface2); }
.sale-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.sale-card-invoice { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--red); }
.sale-card-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.sale-card-amount { font-family: var(--font-display); font-size: 20px; font-weight: 700; }
.sale-card-profit { font-size: 11.5px; text-align: right; margin-top: 3px; font-weight: 600; }
.sale-card-mid { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
.sale-card-customer { font-weight: 600; font-size: 14px; }
.sale-card-vehicle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.sale-card-actions { display: flex; gap: 8px; }

/* BADGES */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.2px; }
.badge-ig { background: rgba(225,48,108,0.12); color: #e1306c; border: 1px solid rgba(225,48,108,0.2); }
.badge-fb { background: rgba(66,103,178,0.12); color: #6d8de0; border: 1px solid rgba(66,103,178,0.2); }
.badge-wa { background: rgba(37,211,102,0.12); color: #25d366; border: 1px solid rgba(37,211,102,0.2); }
.badge-ref { background: rgba(255,255,255,0.06); color: #888; border: 1px solid var(--border); }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: var(--transition); letter-spacing: 0.1px; position: relative; overflow: hidden; }
.btn::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0); transition: background 0.15s; }
.btn:hover::after { background: rgba(255,255,255,0.05); }
.btn:active { transform: scale(0.97); }
.btn-red { background: linear-gradient(135deg, var(--red-light), var(--red)); color: #fff; box-shadow: 0 2px 12px rgba(232,25,44,0.3); }
.btn-red:hover { box-shadow: var(--shadow-red); }
.btn-green { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; box-shadow: 0 2px 12px rgba(34,197,94,0.2); }
.btn-outline { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--border-hover); color: var(--text); }
.btn-ghost { background: var(--surface2); color: var(--text-secondary); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface3); color: var(--text); border-color: var(--border-hover); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-icon { padding: 8px; }

/* INPUTS */
.input-group { margin-bottom: 16px; }
.input-label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 7px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font-body); font-size: 13.5px; padding: 11px 13px; outline: none; transition: var(--transition); -webkit-appearance: none; appearance: none; }
input:focus, select:focus, textarea:focus { border-color: var(--red); background: rgba(232,25,44,0.03); box-shadow: 0 0 0 3px rgba(232,25,44,0.08); }
input::placeholder { color: var(--text-muted); }
select option { background: var(--surface2); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); display: flex; align-items: flex-end; justify-content: center; animation: overlayIn 0.2s ease; }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
.modal { background: var(--surface); border: 1px solid var(--border-hover); border-radius: var(--radius-xl) var(--radius-xl) 0 0; width: 100%; max-width: 100%; max-height: 93vh; overflow-y: auto; animation: sheetUp 0.3s cubic-bezier(0.4,0,0.2,1); }
@keyframes sheetUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle { width: 40px; height: 4px; background: var(--surface4); border-radius: 4px; margin: 12px auto 0; }
.modal-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 2; }
.modal-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: 0.3px; display: flex; align-items: center; gap: 10px; }
.modal-body { padding: 20px; }
.modal-foot { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
.close-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; padding: 7px; border-radius: 8px; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
.close-btn:hover { background: var(--surface3); color: var(--text); }

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-full { grid-column: 1 / -1; }
.form-section { border-top: 1px solid var(--border); padding-top: 18px; margin-bottom: 18px; }
.form-section-label { font-size: 10px; color: var(--red); letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.form-section-label::after { content: ''; flex: 1; height: 1px; background: var(--red-glow); }

/* ITEMS TABLE */
.items-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.items-table th { background: var(--surface3); padding: 8px; font-size: 10px; }
.items-table td { padding: 5px 3px; border-bottom: none; }
.items-table input, .items-table select { padding: 8px 9px; font-size: 13px; }

/* SEARCH */
.search-bar { position: relative; }
.search-bar input { padding-left: 40px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; display: flex; }

/* BILL PREVIEW */
.bill-preview { background: #fff; color: #111; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 13px; overflow: hidden; box-shadow: 0 0 0 1px #e5e5e5; }
.bill-header-bar { background: #111; color: #fff; padding: 24px 28px; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 15px; border-bottom: 4px solid var(--red); }
.bill-logo-text { font-size: 32px; font-weight: 900; letter-spacing: 1.5px; font-family: 'Rajdhani', sans-serif; line-height: 1; }
.bill-logo-text span { color: var(--red); }
.bill-tag { font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.6); margin-top: 4px; font-weight: 700; text-transform: uppercase; }
.bill-info { font-size: 11px; color: #ccc; text-align: right; line-height: 1.6; }
.bill-info-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 2px; margin-bottom: 6px; font-family: 'Rajdhani', sans-serif; text-transform: uppercase; }
.bill-body { padding: 30px; }
.bill-meta { display: flex; gap: 30px; margin-bottom: 30px; flex-wrap: wrap; background: #fafafa; padding: 20px 24px; border-radius: 8px; border: 1px solid #eee; }
.bill-meta-block { flex: 1; min-width: 140px; }
.bill-meta-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; font-weight: 700; }
.bill-meta-val { font-size: 13px; font-weight: 700; color: #111; line-height: 1.5; }
.bill-meta-val.small { font-size: 12px; font-weight: 500; color: #555; margin-top: 2px; }
.bill-table { width: 100%; border-collapse: collapse; margin: 10px 0; border: 1px solid #e5e5e5; }
.bill-table th { background: #f4f4f4; color: #333; padding: 12px 14px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #ddd; }
.bill-table th:last-child { border-right: none; }
.bill-table td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; font-size: 13px; vertical-align: middle; color: #111; }
.bill-table td:last-child { border-right: none; }
.bill-table tr:last-child td { border-bottom: none; }
.bill-table .col-no { width: 30px; text-align: center; font-weight: 600; color: #888; }
.bill-table .col-qty { width: 60px; text-align: center; }
.bill-table .col-rate { width: 90px; text-align: right; }
.bill-table .col-amt { width: 100px; text-align: right; font-weight: 700; }
.bill-totals { margin-top: 16px; }
.bill-total-row { display: flex; justify-content: flex-end; }
.bill-total-table { width: 260px; border-collapse: collapse; }
.bill-total-table td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #f0f0f0; color: #111; }
.bill-total-table td:last-child { text-align: right; font-weight: 700; }
.bill-grand { background: #111; color: #fff; }
.bill-grand td { padding: 14px; border-bottom: none; font-weight: 800; font-size: 14px; color: #fff !important; }
.bill-grand td:last-child { text-align: right; }
.bill-footer { background: var(--red); color: #fff; padding: 12px 24px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
.bill-decl { padding: 14px 24px; font-size: 11px; color: #666; border-top: 1px solid #f0f0f0; background: #fafafa; }

// ─── TOAST ──────────────────────────────────────────────────
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3400); return () => clearTimeout(t); }, []);
  return (
    <div className={`toast ${type}`}>
      <Icon name={type==='success' ? 'checkCircle' : 'xCircle'} size={18} />
      <span style={{color:'var(--text)',fontWeight:500}}>{msg}</span>
    </div>
  );
}

// ─── LOGIN SCREEN ────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = async (e) => {
    e && e.preventDefault();
    if (!username || !password) { setError('Please enter your username and password.'); return; }
    setLoading(true); setError('');
    await new Promise(r => setTimeout(r, 700));
    if (username.trim() === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
      sessionStorage.setItem('torqone_auth', '1');
      onLogin();
    } else {
      setError('Invalid credentials. Please try again.');
    }
    setLoading(false);
  };

  return (
    <div className="login-screen">
      <div className="login-left">
        <div>
          <div style={{marginBottom:48,display:'flex',alignItems:'center',gap:10}}>
            <div style={{fontFamily:'var(--font-display)',fontSize:22,fontWeight:700,letterSpacing:1}}>
              <span style={{color:'var(--red)'}}>TORQ</span>
              <span style={{color:'#fff'}}>ONE.IN</span>
            </div>
            <div style={{background:'var(--red-glow)',border:'1px solid var(--border-active)',borderRadius:6,padding:'3px 10px',fontSize:9,fontWeight:700,color:'var(--red)',letterSpacing:2}}>ADMIN</div>
          </div>
          <div className="login-card">
            <div className="login-card-header">
              <div className="login-card-title">Welcome back</div>
              <div className="login-card-subtitle">Sign in to access your admin panel</div>
            </div>
            {error && (
              <div className="login-error">
                <Icon name="alert" size={15} color="#ff4d5e" />
                <span>{error}</span>
              </div>
            )}
            <form onSubmit={handleLogin}>
              <div className="input-group">
                <label className="input-label">Username</label>
                <input value={username} onChange={e=>setUsername(e.target.value)} placeholder="Enter your username" autoComplete="username" autoFocus />
              </div>
              <div className="input-group">
                <label className="input-label">Password</label>
                <div className="password-field">
                  <input type={showPw?'text':'password'} value={password} onChange={e=>setPassword(e.target.value)} placeholder="Enter your password" autoComplete="current-password" style={{paddingRight:44}} />

                </div>
              </div>
              <button className="btn btn-red login-btn" type="submit" disabled={loading}>
                {loading ? <><span className="spinner"></span> Authenticating…</> : <><Icon name="login" size={15} /> Sign In</>}
              </button>
            </form>
            <div className="login-footer">TORQONE.IN Admin Panel · Edappally, Kochi · © 2026</div>

        </div>
      </div>
      <div className="login-right">
        <div className="login-brand">
          <div className="login-brand-logo"><span className="r">TORQ</span><span className="w">ONE</span></div>
          <div style={{fontFamily:'var(--font-display)',fontSize:18,color:'rgba(255,255,255,0.12)',letterSpacing:6,marginTop:4}}>· IN ·</div>

// ─── SETUP SCREEN ────────────────────────────────────────────
function SetupScreen({ onConnect }) {
  const [url, setUrl] = useState('');
  const [key, setKey] = useState('');
  const [showSql, setShowSql] = useState(false);
  const connect = () => {
    if (!url || !key) return;
    localStorage.setItem('torqone_sb_url', url);
    localStorage.setItem('torqone_sb_key', key);
    onConnect(url, key);
  };
  return (
    <div className="setup-screen fade-in">
      <div className="setup-card">
        <div style={{textAlign:'center',marginBottom:32}}>
          <div className="setup-logo"><span>TORQ</span>ONE.IN</div>

        <button className="btn btn-red" style={{width:'100%',justifyContent:'center',marginBottom:12,padding:'12px'}} onClick={connect}>

        </button>
        <button className="btn btn-outline" style={{width:'100%',justifyContent:'center',fontSize:12}} onClick={()=>setShowSql(!showSql)}>

// ─── PDF GENERATOR ───────────────────────────────────────────
function getPdfDoc(sale) {
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const W = 210; let y = 0;
  doc.setFillColor(10,10,10); doc.rect(0,0,W,36,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(22);
  doc.setTextColor(232,25,44); doc.text('TORQ', 14, 20);
  const tw = doc.getTextWidth('TORQ');
  doc.setTextColor(255,255,255); doc.text('ONE.IN', 14+tw, 20);
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.setTextColor(150,150,150); doc.text('AUTOMOTIVE PERFORMANCE HUB', 14, 28);
  doc.setFontSize(9); doc.setTextColor(200,200,200);
  doc.text('Edappally, Kochi, Kerala | Mobile: 9037523225', W-14, 16, {align:'right'});
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
  doc.text(`Invoice No: ${sale.invoice_no}`, W-14, 22, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setTextColor(200,200,200);
  doc.text(`Date: ${sale.invoice_date}`, W-14, 28, {align:'right'});
  y = 44;
  doc.setTextColor(120,120,120); doc.setFontSize(8); doc.setFont('helvetica','bold');
  doc.text('BILL TO', 14, y); y += 5;
  doc.setTextColor(0,0,0); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text(sale.customer_name, 14, y); y += 5;
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  if(sale.customer_address) { doc.text(sale.customer_address, 14, y); y += 5; }
  doc.text(`Mobile: ${sale.customer_mobile||'—'}`, 14, y);
  let vy = 49;
  doc.setFontSize(8); doc.setTextColor(120,120,120); doc.setFont('helvetica','bold');
  doc.text('VEHICLE', W/2, vy); vy+=5;
  doc.setFontSize(11); doc.setTextColor(0,0,0);
  doc.text(`${sale.vehicle_model||'—'} ${sale.vehicle_year||''}`, W/2, vy); vy+=5;
  doc.setFontSize(8); doc.setTextColor(120,120,120); doc.text('PAYMENT', W/2, vy+2); vy+=7;
  doc.setFontSize(9); doc.setTextColor(0,0,0); doc.setFont('helvetica','normal');
  doc.text(sale.payment_mode, W/2, vy);
  y = 82;
  doc.setFillColor(10,10,10); doc.rect(14, y-5, W-28, 8, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(255,255,255);
  doc.text('#', 17, y); doc.text('Part Description', 25, y);
  doc.text('Qty', 110, y); doc.text('Rate (₹)', 130, y); doc.text('Amount (₹)', W-14, y, {align:'right'});
  y += 4;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(0,0,0);
  (sale.items||[]).forEach((item,i) => {
    y += 7;
    if(i%2===0){ doc.setFillColor(248,248,248); doc.rect(14,y-5,W-28,7,'F'); }
    doc.text(String(i+1),17,y);
    doc.text(doc.splitTextToSize(item.description,80)[0],25,y);
    doc.text(`${item.qty} ${item.unit}`,110,y);
    doc.text(Number(item.rate).toLocaleString('en-IN'),130,y);
    doc.text(Number(item.amount).toLocaleString('en-IN'),W-14,y,{align:'right'});
  });
  y += 12;
  const tx = W-78;
  doc.setDrawColor(220,220,220); doc.line(tx,y-2,W-14,y-2);
  doc.setFontSize(9);
  doc.text('Subtotal',tx,y); doc.text(`₹${Number(sale.subtotal).toLocaleString('en-IN')}`,W-14,y,{align:'right'});
  y+=6; doc.text('GST',tx,y); doc.text('NIL',W-14,y,{align:'right'});
  y+=3; doc.line(tx,y,W-14,y); y+=5;
  doc.setFillColor(10,10,10); doc.rect(tx-2,y-5,W-14-tx+16,9,'F');
  doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text('Grand Total',tx,y); doc.text(`₹${Number(sale.grand_total).toLocaleString('en-IN')}`,W-14,y,{align:'right'});
  y+=14; doc.setTextColor(0,0,0); doc.setFont('helvetica','normal'); doc.setFontSize(8);
  doc.text('Declaration: Goods sold without GST. Non-GST automotive spare parts seller.',14,y);
  y+=8; doc.text(`Payment Mode: ${sale.payment_mode}`,14,y);
  y+=16; doc.text('Authorized Signatory',W-14,y,{align:'right'});
  y+=5; doc.setFont('helvetica','bold');
  doc.text('For TORQONE.IN',W-14,y,{align:'right'});
  y+=4; doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(120,120,120);
  doc.text('Automotive Spare Parts Store, Edappally, Kochi',W-14,y,{align:'right'});
  doc.setFillColor(232,25,44); doc.rect(0,287,W,10,'F');
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(255,255,255);
  doc.text('torqone.in · 9037523225 · Edappally, Kochi, Kerala',14,293);
  doc.text('Thank you for your purchase!',W-14,293,{align:'right'});
  return doc;
}

function generatePDF(sale) {
  getPdfDoc(sale).save(`TORQONE_INVOICE_${sale.invoice_no.replace('/','_')}.pdf`);
}

// ─── WHATSAPP ────────────────────────────────────────────────
function shareOnWhatsApp(sale, type='customer') {
  const doc = getPdfDoc(sale);
  const pdfBlob = doc.output('blob');
  
  const rawPhone = type==='customer'?(sale.customer_mobile||''):'';
  const phone = rawPhone.replace(/\D/g,'').replace(/^0/,'91').replace(/^(?!91)/,'91');
  const textMsg = type==='customer' 
    ? 'Hello! Here is your invoice from TORQONE.IN. Thank you for your purchase!' 
    : 'Hello, please find the list of required auto parts attached.';

  // Attempt HTML5 Web Share API (Mobile Native Sharing)
  if (navigator.canShare) {
    const file = new File([pdfBlob], `TORQONE_INVOICE_${sale.invoice_no.replace('/','_')}.pdf`, { type: 'application/pdf' });
    if (navigator.canShare({ files: [file] })) {
      navigator.share({
        files: [file],
        title: 'Invoice',
        text: textMsg
      }).catch(e => console.log('Share failed or cancelled.', e));
      return;
    }
  }
  
  // Fallback for Desktop/Non-Supported: Auto-download and open chat
  doc.save(`TORQONE_INVOICE_${sale.invoice_no.replace('/','_')}.pdf`);
  const url = phone.length>5 ? `https://wa.me/${phone}?text=${encodeURIComponent(textMsg + "\n\n(Please find the downloaded PDF invoice attached.)")}` : `https://wa.me/?text=${encodeURIComponent(textMsg)}`;
  alert("The invoice PDF has been downloaded to your device!\n\nThe WhatsApp chat will now open independently. Please manually ATTACH the downloaded PDF file to send it to the customer.");
  window.open(url,'_blank');
}

    customer_name:'', customer_mobile:'', customer_address:'',
    vehicle_model:'', vehicle_year:'',
    lead_source:'instagram', dealer_name:'',
    payment_mode:'Cash', notes:'',

  useEffect(() => { if (!editSale) setForm(f=>({...f, invoice_no:genInvoiceNo()})); }, []);

  const setField = (k,v) => setForm(f=>({...f,[k]:v}));
  const setItem = (i,k,v) => {
    const items = [...form.items];
    items[i] = {...items[i],[k]:v};
    const rate = parseFloat(k==='rate'?v:items[i].rate)||0;
    const buying_rate = parseFloat(k==='buying_rate'?v:items[i].buying_rate)||0;
    const qty = parseFloat(k==='qty'?v:items[i].qty)||0;
    items[i].amount = rate*qty; items[i].buying_amount = buying_rate*qty;
    setForm(f=>({...f,items}));
  };
  const addItem = () => setForm(f=>({...f,items:[...f.items,defaultItem()]}));

  const buying_total = form.items.reduce((a,i)=>a+(parseFloat(i.buying_amount)||0),0);

// ─── DASHBOARD ───────────────────────────────────────────────
function Dashboard({ sales }) {
  const totalRevenue = sales.reduce((a,s)=>a+(s.grand_total||0),0);
  const totalProfit = sales.reduce((a,s)=>a+(s.profit||0),0);
  const thisMonth = new Date().toISOString().slice(0,7);
  const monthSales = sales.filter(s=>s.invoice_date?.slice(0,7)===thisMonth);
  const monthRevenue = monthSales.reduce((a,s)=>a+(s.grand_total||0),0);
  const sourceCount = {};
  sales.forEach(s=>{ sourceCount[s.lead_source]=(sourceCount[s.lead_source]||0)+1; });
  const topSource = Object.entries(sourceCount).sort((a,b)=>b[1]-a[1])[0];
  const recent = [...sales].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5);
  const margin = totalRevenue>0 ? ((totalProfit/totalRevenue)*100).toFixed(1) : 0;

  return (
    <div className="fade-in">
      <div className="stats-grid">
        <div className="stat-card accent">
          <div className="stat-card-icon red-icon"><Icon name="rupee" size={18} /></div>
          <div className="stat-label">Total Revenue</div>
          <div className="stat-value">{fmt(totalRevenue)}</div>
          <div className="stat-sub">{sales.length} total sales recorded</div>
        </div>
        <div className="stat-card">
          <div className="stat-card-icon green-icon"><Icon name="trending" size={18} /></div>
          <div className="stat-label">Net Profit</div>
          <div className={`stat-value ${totalProfit>=0?'green':'red'}`}>{fmt(totalProfit)}</div>
          <div className="stat-sub">Margin: {margin}%</div>
        </div>
        <div className="stat-card">
          <div className="stat-card-icon orange-icon"><Icon name="calendar" size={18} /></div>
          <div className="stat-label">This Month</div>
          <div className="stat-value orange">{fmt(monthRevenue)}</div>
          <div className="stat-sub">{monthSales.length} sales this month</div>
        </div>
        <div className="stat-card">
          <div className="stat-card-icon blue-icon"><Icon name="zap" size={18} /></div>
          <div className="stat-label">Top Lead Source</div>
          <div className="stat-value" style={{fontSize:18,paddingTop:4,display:'flex',alignItems:'center',gap:8}}>
            {topSource ? <><Icon name={sourceIcon(topSource[0])} size={20} />{sourceLabel(topSource[0])}</> : '—'}
          </div>
          <div className="stat-sub">{topSource ? `${topSource[1]} leads` : 'No data yet'}</div>
        </div>
      </div>

      <div className="table-card">
        <div className="table-header">
          <div className="table-title">Recent Sales</div>
          <div style={{fontSize:12,color:'var(--text-muted)'}}>Last 5 transactions</div>
        </div>
        {recent.length===0 ? (
          <div className="empty-state">
            <div className="empty-icon"><Icon name="car" size={48} /></div>
            <div className="empty-text">No sales yet</div>
            <div className="empty-sub">Add your first sale to get started</div>
          </div>
        ) : (
          <table>
            <thead><tr><th>Invoice</th><th>Customer</th><th>Vehicle</th><th>Source</th><th>Amount</th><th>Profit</th></tr></thead>
            <tbody>
              {recent.map(s=>(
                <tr key={s.id}>
                  <td><div className="text-red fw-600 font-display" style={{fontSize:14}}>{s.invoice_no}</div><div className="fs-11 text-muted mt-4">{s.invoice_date}</div></td>
                  <td><div className="fw-600">{s.customer_name}</div><div className="fs-11 text-muted">{s.customer_mobile}</div></td>
                  <td className="text-secondary">{s.vehicle_model||'—'}</td>

// ─── P&L ─────────────────────────────────────────────────────
function ProfitLoss({ sales }) {
  const [period, setPeriod] = useState('all');
  const now = new Date();
  const thisMonth = now.toISOString().slice(0,7);
  const thisYear = String(now.getFullYear());

  const filtered = sales.filter(s=>{
    if(period==='all') return true;
    if(period==='month') return s.invoice_date?.slice(0,7)===thisMonth;
    if(period==='year') return s.invoice_date?.slice(0,4)===thisYear;
    return true;
  });

  const revenue = filtered.reduce((a,s)=>a+(s.grand_total||0),0);
  const cost = filtered.reduce((a,s)=>a+(s.buying_total||0),0);
  const profit = revenue - cost;
  const margin = revenue>0 ? ((profit/revenue)*100).toFixed(1) : 0;

  const monthly = {};
  sales.forEach(s=>{
    const m = s.invoice_date?.slice(0,7); if(!m) return;
    if(!monthly[m]) monthly[m]={revenue:0,cost:0,profit:0,count:0};
    monthly[m].revenue+=s.grand_total||0; monthly[m].cost+=s.buying_total||0;
    monthly[m].profit+=s.profit||0; monthly[m].count++;
  });
  const months = Object.entries(monthly).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,8);

  const bySrc = {};
  filtered.forEach(s=>{
    if(!bySrc[s.lead_source]) bySrc[s.lead_source]={revenue:0,profit:0,count:0};
    bySrc[s.lead_source].revenue+=s.grand_total||0;
    bySrc[s.lead_source].profit+=s.profit||0;
    bySrc[s.lead_source].count++;
  });

  return (
    <div className="fade-in">
      <div className="tabs">
        {[['all','All Time'],['month','This Month'],['year','This Year']].map(([v,l])=>(
          <div key={v} className={`tab ${period===v?'active':''}`} onClick={()=>setPeriod(v)}>{l}</div>
        ))}
      </div>
      <div className="stats-grid">
        <div className="stat-card accent">
          <div className="stat-card-icon red-icon"><Icon name="rupee" size={18} /></div>
          <div className="stat-label">Revenue</div>
          <div className="stat-value">{fmt(revenue)}</div>
          <div className="stat-sub">{filtered.length} transactions</div>
        </div>
        <div className="stat-card">
          <div className="stat-card-icon orange-icon"><Icon name="barChart" size={18} /></div>
          <div className="stat-label">Buying Cost</div>
          <div className="stat-value orange">{fmt(cost)}</div>
          <div className="stat-sub">Total inventory cost</div>
        </div>
        <div className="stat-card">
          <div className="stat-card-icon green-icon"><Icon name="trending" size={18} /></div>
          <div className="stat-label">Net Profit</div>
          <div className={`stat-value ${profit>=0?'green':'red'}`}>{fmt(profit)}</div>
          <div className="stat-sub">After all costs</div>
        </div>
        <div className="stat-card">
          <div className="stat-card-icon blue-icon"><Icon name="zap" size={18} /></div>
          <div className="stat-label">Profit Margin</div>
          <div className={`stat-value ${profit>=0?'green':'red'}`}>{margin}%</div>
          <div className="stat-sub">Of total revenue</div>
        </div>
      </div>

      <div className="pl-grid">
        <div className="pl-card">
          <div style={{fontFamily:'var(--font-display)',fontSize:16,fontWeight:700,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
            <Icon name="calendar" size={16} color="var(--red)" /> Monthly Breakdown
          </div>
          <table>
            <thead><tr><th>Month</th><th>Sales</th><th>Revenue</th><th>Cost</th><th>Profit</th></tr></thead>
            <tbody>
              {months.length===0
                ? <tr><td colSpan="5" style={{textAlign:'center',padding:30,color:'var(--text-muted)'}}>No data available</td></tr>
                : months.map(([m,d])=>(
                  <tr key={m}>
                    <td className="fw-600">{m}</td>
                    <td>{d.count}</td>
                    <td className="fw-600">{fmt(d.revenue)}</td>
                    <td className="text-orange">{fmt(d.cost)}</td>
                    <td><span className={`profit-badge ${d.profit>=0?'up':'down'}`}><Icon name="trending" size={10} />{fmt(Math.abs(d.profit))}</span></td>
                  </tr>
                ))}
            </tbody>
          </table>
        </div>
        <div className="pl-card">
          <div style={{fontFamily:'var(--font-display)',fontSize:16,fontWeight:700,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
            <Icon name="zap" size={16} color="var(--red)" /> By Lead Source
          </div>
          <table>
            <thead><tr><th>Source</th><th>Sales</th><th>Revenue</th><th>Profit</th></tr></thead>
            <tbody>
              {Object.entries(bySrc).length===0
                ? <tr><td colSpan="4" style={{textAlign:'center',padding:30,color:'var(--text-muted)'}}>No data available</td></tr>
                : Object.entries(bySrc).sort((a,b)=>b[1].revenue-a[1].revenue).map(([src,d])=>(
                  <tr key={src}>
                    <td><span className={`badge ${sourceBadge(src)}`}><Icon name={sourceIcon(src)} size={10} />{sourceLabel(src)}</span></td>
                    <td>{d.count}</td>
                    <td className="fw-600">{fmt(d.revenue)}</td>
                    <td><span className={`profit-badge ${d.profit>=0?'up':'down'}`}><Icon name="trending" size={10} />{fmt(Math.abs(d.profit))}</span></td>
                  </tr>
                ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── CUSTOMER HISTORY ────────────────────────────────────────
function CustomerHistory({ sales, onView }) {
  const [search, setSearch] = useState('');
  const [open, setOpen] = useState(null);

  const customers = {};
  sales.forEach(s=>{
    const k = s.customer_mobile||s.customer_name;
    if(!customers[k]) customers[k]={name:s.customer_name,mobile:s.customer_mobile,address:s.customer_address,sales:[]};
    customers[k].sales.push(s);
  });

  const list = Object.entries(customers).filter(([_,c])=>{
    const q = search.toLowerCase();
    return !q || c.name?.toLowerCase().includes(q) || c.mobile?.includes(q);
  }).sort((a,b)=>b[1].sales.length-a[1].sales.length);

  return (
    <div className="fade-in">
      <div className="search-bar" style={{marginBottom:20}}>
        <span className="search-icon"><Icon name="search" size={15} /></span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search customers by name or mobile…" />
      </div>
      {list.length===0
        ? <div className="empty-state"><div className="empty-icon"><Icon name="users" size={52} /></div><div className="empty-text">No customers yet</div></div>
        : list.map(([k,c])=>(
          <div className="customer-card" key={k}>
            <div className="customer-card-head" onClick={()=>setOpen(open===k?null:k)}>
              <div>
                <div className="customer-name">{c.name}</div>
                <div className="customer-meta">{[c.mobile,c.address].filter(Boolean).join(' · ')} · {c.sales.length} order{c.sales.length!==1?'s':''} · {fmt(c.sales.reduce((a,s)=>a+(s.grand_total||0),0))} total</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontFamily:'var(--font-display)',fontSize:16,fontWeight:700}}>{fmt(c.sales.reduce((a,s)=>a+(s.grand_total||0),0))}</span>
                <Icon name={open===k?'chevronUp':'chevronDown'} size={18} color="var(--text-muted)" />
              </div>
            </div>
            <div className={`customer-body ${open===k?'open':''}`}>
              <table>
                <thead><tr><th>Invoice</th><th>Date</th><th>Vehicle</th><th>Amount</th><th>Source</th><th></th></tr></thead>
                <tbody>
                  {c.sales.sort((a,b)=>new Date(b.invoice_date)-new Date(a.invoice_date)).map(s=>(
                    <tr key={s.id}>
                      <td style={{fontFamily:'var(--font-display)',color:'var(--red)',fontWeight:700}}>{s.invoice_no}</td>
                      <td className="text-muted">{s.invoice_date}</td>
                      <td>{s.vehicle_model||'—'}</td>
                      <td className="fw-600">{fmt(s.grand_total)}</td>
                      <td><span className={`badge ${sourceBadge(s.lead_source)}`}><Icon name={sourceIcon(s.lead_source)} size={10} />{sourceLabel(s.lead_source)}</span></td>
                      <td><button className="btn btn-ghost btn-sm" onClick={()=>onView(s)} style={{display:'flex',alignItems:'center',gap:6}}><Icon name="invoice" size={13} /> View Bill</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        ))
      }
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────
const NAV = [
  { id:'dashboard', icon:'dashboard', label:'Dashboard' },
  { id:'sales',     icon:'sales',     label:'Sales' },
  { id:'pl',        icon:'trending',  label:'P&L Report' },
  { id:'customers', icon:'users',     label:'Customers' },
];
const PAGE_TITLE = { dashboard:'Dashboard', sales:'Sales', pl:'P&L Report', customers:'Customers' };

function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [sb, setSb] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [sales, setSales] = useState([]);
  const [loading, setLoading] = useState(false);
  const [modal, setModal] = useState(null);
  const [selected, setSelected] = useState(null);
  const [toast, setToast] = useState(null);

  useEffect(() => { if (sessionStorage.getItem('torqone_auth')==='1') setLoggedIn(true); }, []);
  useEffect(() => {
    if (!loggedIn) return;
    const url = localStorage.getItem('torqone_sb_url');
    const key = localStorage.getItem('torqone_sb_key');
    if (url && key) initSupabase(url, key);
  }, [loggedIn]);

  const showToast = (msg, type='success') => {
    setToast({msg,type});
    setTimeout(()=>setToast(null), 3600);
  };

  const initSupabase = (url, key) => {
    try {
      const client = createClient(url, key);
      setSb(client);
      loadSales(client);
    } catch(e) { showToast('Failed to connect to Supabase', 'error'); }
  };

  const loadSales = async (client) => {
    setLoading(true);
    try {
      const { data, error } = await client.from('sales').select('*').order('created_at',{ascending:false});
      if (error) throw error;
      setSales(data||[]);
    } catch(e) { showToast('Error loading: '+e.message, 'error'); }
    setLoading(false);
  };

  const saveSale = async (form) => {
    if (!sb) return;
    try {
      if (selected?.id) {
        const { error } = await sb.from('sales').update(form).eq('id',selected.id);
        if (error) throw error;
        setSales(s=>s.map(x=>x.id===selected.id?{...x,...form}:x));
        showToast('Sale updated successfully');
      } else {
        const { data, error } = await sb.from('sales').insert([form]).select();
        if (error) throw error;
        setSales(s=>[data[0],...s]);
        showToast('Sale saved successfully');
      }
      setModal(null); setSelected(null);
    } catch(e) { showToast('Error: '+e.message, 'error'); }
  };

  const deleteSale = async (s) => {
    if (!window.confirm(`Delete invoice ${s.invoice_no}?`)) return;
    try {
      const { error } = await sb.from('sales').delete().eq('id',s.id);
      if (error) throw error;
      setSales(prev=>prev.filter(x=>x.id!==s.id));
      showToast('Sale deleted');
    } catch(e) { showToast('Error: '+e.message, 'error'); }
  };

  const handleLogout = () => {
    sessionStorage.removeItem('torqone_auth');
    setLoggedIn(false); setSb(null); setSales([]);
  };

  if (!loggedIn) return <LoginScreen onLogin={()=>setLoggedIn(true)} />;
  if (!sb) return <SetupScreen onConnect={initSupabase} />;

  return (
    <div className="app">
      {/* Desktop Sidebar */}
      <div className="sidebar">
        <div className="logo-area">
          <div className="logo-wordmark">
            <span className="r">TORQ</span>
            <span className="logo-dot"></span>
            <span className="w">ONE</span>
          </div>
          <div className="logo-sub">Admin Panel</div>
        </div>
        <nav className="nav">
          <div className="nav-section-label">Main Menu</div>
          {NAV.map(n=>(
            <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              <Icon name={n.icon} size={16} />
              {n.label}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="sidebar-user">
            <div className="sidebar-avatar"><Icon name="user" size={15} /></div>
            <div className="sidebar-user-info">
              <div className="sidebar-user-name">Admin</div>
              <div className="sidebar-user-role">TORQONE.IN</div>
            </div>
            <div className="sidebar-conn-dot" title="Connected"></div>
          </div>
          <div className="sidebar-disconnect" onClick={handleLogout}>
            <Icon name="logout" size={14} />
            Sign Out
          </div>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <div className="topbar">
          <div className="topbar-left">
            <div className="topbar-page-indicator">
              <div className="topbar-page-icon">
                <Icon name={NAV.find(n=>n.id===page)?.icon||'dashboard'} size={15} />
              </div>
              <div className="page-title">{PAGE_TITLE[page]}</div>
            </div>
          </div>
          <div className="topbar-right">
            {loading && <span className="spinner"></span>}
            <button className="btn btn-ghost btn-sm" onClick={()=>loadSales(sb)}>
              <Icon name="refresh" size={13} /> Refresh
            </button>
            <button className="btn btn-red btn-sm" onClick={()=>{setSelected(null);setModal('new')}}>
              <Icon name="plus" size={14} /> New Sale
            </button>
          </div>
        </div>

        <div className="content">
          {page==='dashboard' && <Dashboard sales={sales} />}
          {page==='sales' && <SalesList sales={sales} onNew={()=>{setSelected(null);setModal('new')}} onEdit={s=>{setSelected(s);setModal('edit')}} onView={s=>{setSelected(s);setModal('bill')}} onDelete={deleteSale} />}
          {page==='pl' && <ProfitLoss sales={sales} />}
          {page==='customers' && <CustomerHistory sales={sales} onView={s=>{setSelected(s);setModal('bill')}} />}
        </div>
      </div>

      {/* Mobile Bottom Nav */}
      <div className="bottom-nav">
        {NAV.map(n=>(
          <button key={n.id} className={`bottom-nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
            <Icon name={n.icon} size={20} />
            <span>{n.label.split(' ')[0]}</span>
          </button>
        ))}
        <button className="bottom-nav-fab" onClick={()=>{setSelected(null);setModal('new')}}>
          <div className="fab-circle"><Icon name="plus" size={22} color="#fff" /></div>
          <span style={{fontSize:10,color:'var(--text-muted)'}}>New</span>
        </button>
      </div>

      {/* Modals */}
      {(modal==='new'||modal==='edit') && (
        <NewSaleModal editSale={modal==='edit'?selected:null} onClose={()=>{setModal(null);setSelected(null)}} onSave={saveSale} />
      )}
      {modal==='bill' && selected && (
        <BillModal sale={selected} onClose={()=>{setModal(null);setSelected(null)}} />
      )}

      {/* Toast */}
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
